{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Recommender</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/styles/css' %}">
</head>

<body>
  <div id="register-form" class="chat-container">
    <form action="">
      <h2 class="text-xl font-bold mb-4 text-center">Register</h2>
      <input type="text" class="border p-2 rounded w-full mb-2" name="name" placeholder="Name" required>
      <input type="email" class="border p-2 rounded w-full mb-2" name="email" placeholder="Email" required>
      <input type="date" class="border p-2 rounded w-full mb-2" name="date" placeholder="Birthday" required>
      <input type="password" class="border p-2 rounded w-full mb-2" name="password" placeholder="Password" required>
      <input type="password" class="border p-2 rounded w-full mb-2" name="password" placeholder="Confirm Password" required>

      <button type="submit" name="action" value="back" class="submit-button bg-indigo-600 text-white px-4 py-2 rounded">⬅ Back</button>
      <button type="submit" class="submit-button bg-indigo-600 text-white px-4 py-2 rounded" >Register</button>
    </form>
  </div>
</body>
</html>
