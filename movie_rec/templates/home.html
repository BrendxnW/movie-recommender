{% extends "base.html" %}
{% block title %}Home{% endblock %}
{% block content %}

<div class="chat-container">
    <h1 class="text-xl font-bold mb-4 text-center">
        Welcome Back! I am your Movie ChatBot
    </h1>

    <div class="message-bubble">
        Which feature would you like to use?
    </div>

    <form method="POST" class="flex gap-4">
        {% csrf_token %}
        <button type="submit" name="action" value="sign_out" formnovalidate class="submit-button bg-red-500 text-white px-4 py-2 rounded">
            Sign Out
        </button>
        <a href="{% url 'recommender' %}" type="submit" name="action" value="back" class="submit-button bg-indigo-600 text-white px-4 py-2 rounded">
            Recommender
        </a>
        <a href="{% url 'remixer' %}" type="submit" name="action" value="back" class="submit-button bg-indigo-600 text-white px-4 py-2 rounded">
            Remixer
        </a>
    </form>
</div>


{% endblock %}
